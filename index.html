    // ─── Calculations ─────────────────────────────────────────────────────────

    function srmToRgb(srm) {
      const s = Math.min(Math.max(srm, 0), 40);
      const t = [
        [0,[255,239,153]],[2,[255,216,106]],[4,[255,186,66]],
        [6,[248,166,0]],[8,[224,120,0]],[12,[176,72,0]],
        [16,[128,44,0]],[20,[96,28,0]],[30,[52,12,0]],[40,[16,4,0]],
      ];
      for (let i = 0; i < t.length - 1; i++) {
        if (s >= t[i][0] && s <= t[i+1][0]) {
          const f = (s - t[i][0]) / (t[i+1][0] - t[i][0]);
          return t[i][1].map((c,j) => Math.round(c + (t[i+1][1][j] - c) * f));
        }
      }
      return [16,4,0];
    }
    const srmHex = s => { const [r,g,b] = srmToRgb(s); return `rgb(${r},${g},${b})`; };

    function tinseth(aa, oz, mins, ogPts, bg) {
      if (!oz || oz <= 0 || mins <= 0 || bg <= 0) return 0;
      const og = 1 + ogPts / 1000;
      return 1.65 * Math.pow(0.000125, og-1) * ((1 - Math.exp(-0.04*mins)) / 4.15) * (aa/100) * oz * 7489 / bg;
    }

    function calcStats(grains, hops, yeast, batchSize, efficiency) {
      const bs = parseFloat(batchSize) || 5.5;
      const eff = parseFloat(efficiency) || 75;
      const totalGrainPts = grains.reduce((s,g) => s + (parseFloat(g.lbs)||0) * g.ppg, 0);
      const ogPts = totalGrainPts * (eff/100) / bs;
      const og = 1 + ogPts/1000;
      const fg = 1 + (ogPts/1000) * (1 - yeast.atten/100);
      const abv = (og - fg) * 131.25;
      const mcu = grains.reduce((s,g) => s + (parseFloat(g.lbs)||0) * g.color, 0) / bs;
      const srm = mcu > 0 ? 1.4922 * Math.pow(mcu, 0.6859) : 0;
      const ibu = hops.filter(h => h.type==='Boil'||h.type==='Whirlpool')
        .reduce((s,h) => s + tinseth(parseFloat(h.aa)||0, parseFloat(h.oz)||0,
          h.type==='Whirlpool'?15:(parseFloat(h.time)||0), ogPts, bs), 0);
      const lbs = grains.reduce((s,g) => s + (parseFloat(g.lbs)||0), 0);
      return { og, fg, abv, srm, ibu,
        bgu: og > 1 ? ibu/((og-1)*1000) : 0,
        lbs, ogPts, bs,
        preboilOG: 1 + (ogPts*bs)/((bs+1)*1000),
        totalGrainPts };
    }

    // ─── GitHub API with write queue ──────────────────────────────────────────

    const GH = 'https://api.github.com';
    const ghH = pat => ({ Authorization: `token ${pat}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' });
    const b64e = s => btoa(unescape(encodeURIComponent(s)));
    const b64d = s => decodeURIComponent(escape(atob(s.replace(/\s/g,''))));

    async function ghGetRaw(cfg, path) {
      const res = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`, { headers: ghH(cfg.pat) });
      if (res.status === 404) return null;
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GET ${res.status}`); }
      const d = await res.json();
      return { content: JSON.parse(b64d(d.content)), sha: d.sha };
    }

    async function ghPutFile(cfg, path, content, sha, msg) {
      const body = { message: msg, content: b64e(JSON.stringify(content, null, 2)) };
      if (sha) body.sha = sha;
      const res = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,
        { method: 'PUT', headers: ghH(cfg.pat), body: JSON.stringify(body) });
      if (res.status === 409 || res.status === 422) {
        const fresh = await ghGetRaw(cfg, path);
        const body2 = { message: msg, content: b64e(JSON.stringify(content, null, 2)) };
        if (fresh) body2.sha = fresh.sha;
        const res2 = await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,
          { method: 'PUT', headers: ghH(cfg.pat), body: JSON.stringify(body2) });
        if (!res2.ok) { const e = await res2.json(); throw new Error(e.message || `PUT retry ${res2.status}`); }
        return (await res2.json()).content.sha;
      }
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `PUT ${res.status}`); }
      return (await res.json()).content.sha;
    }

    async function ghDel(cfg, path, msg) {
      const fresh = await ghGetRaw(cfg, path);
      if (!fresh) return;
      await fetch(`${GH}/repos/${cfg.owner}/${cfg.repo}/contents/${path}`,
        { method: 'DELETE', headers: ghH(cfg.pat), body: JSON.stringify({ message: msg, sha: fresh.sha }) });
    }

    async function testConn(cfg) {

    }

    function makeWriteQueue(shaRef, setSyncSt, setSyncErr) {
      let running = false;
      let pending = null;
      async function runNext() {
        if (running || !pending) return;
        running = true;
        const job = pending; pending = null;
        setSyncSt('syncing');
        try {
          const { cfg, recipe, index } = job;
          const rp = `recipes/${recipe.id}.json`, ip = 'recipes/index.json';
          shaRef.current[rp] = await ghPutFile(cfg, rp, recipe, shaRef.current[rp], `Update: ${recipe.name}`);
          shaRef.current[ip] = await ghPutFile(cfg, ip, index, shaRef.current[ip], `Index: ${recipe.name}`);
          setSyncSt('synced'); setSyncErr('');
          setTimeout(() => setSyncSt(st => st==='synced'?'idle':st), 3000);
          job.resolve();
        } catch(e) { setSyncSt('error'); setSyncErr(e.message); job.reject(e); }
        running = false;
        if (pending) runNext();
      }
      return (cfg, recipe, index) => new Promise((resolve, reject) => {
        pending = { cfg, recipe, index, resolve, reject };
        runNext();
      });
    }

          minWidth: 40, minHeight: 40, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        x
      </button>
    );

    const Card = ({ children, sx={} }) => (
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: 14, ...sx }}>
        {children}
      </div>
    );

    const Modal = ({ onClose, title, children, width=480 }) => (
      <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 200,
        display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}
        onClick={onClose}>
        <div style={{ background: C.surface, border: `1px solid ${C.borderLt}`, borderRadius: 8,
          width: '100%', maxWidth: width, maxHeight: '88vh', overflowY: 'auto',
          boxShadow: '0 24px 64px rgba(0,0,0,0.7)' }}
          onClick={e => e.stopPropagation()}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '13px 16px', borderBottom: `1px solid ${C.border}` }}>
            <div style={{ fontFamily: mono, fontSize: 11, color: C.amber, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700 }}>{title}</div>
            <XBtn onClick={onClose} />
          </div>
          <div style={{ padding: 16 }}>{children}</div>
        </div>
      </div>
    );

    // ─── Sync badge ───────────────────────────────────────────────────────────

    const SyncBadge = ({ status, onRetry }) => {
      if (status === 'idle') return null;
      const m = {
        syncing: { color: C.muted,  label: 'saving...' },
        synced:  { color: C.green,  label: 'saved' },
        error:   { color: C.red,    label: 'save failed — retry?' },
      };
      const info = m[status] || m.syncing;
      return (
        <span onClick={status==='error'?onRetry:undefined}
          style={{ fontSize: 11, color: info.color, fontFamily: mono,
            cursor: status==='error'?'pointer':'default',
            padding: '3px 9px', border: `1px solid ${info.color}55`, borderRadius: 4 }}>
          {info.label}
        </span>
      );
    };

    // ─── Stats components ─────────────────────────────────────────────────────

    const StatBlock = ({ label, value, dot }) => (
      <div style={{ textAlign: 'center', padding: '11px 4px' }}>
        <div style={{ fontSize: 9, color: C.muted, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 5 }}>{label}</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5 }}>
          {dot && <div style={{ width: 10, height: 10, borderRadius: '50%', background: dot, flexShrink: 0, boxShadow: `0 0 6px ${dot}` }} />}
          <span style={{ fontSize: 22, fontWeight: 700, color: C.amber, fontFamily: mono, lineHeight: 1 }}>{value}</span>
        </div>
      </div>
    );

    const CompHeader = () => (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 6, paddingBottom: 6, borderBottom: `1px solid ${C.faint}` }}>
        <div />
        {['Target','Actual','Delta'].map(h => (
          <div key={h} style={{ textAlign: 'center', fontSize: 9, color: C.faint, letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: mono }}>{h}</div>
        ))}
      </div>
    );

    const CompRow = ({ label, target, actual, fmt, unit='' }) => {
      const hasA = actual !== '' && actual !== null && actual !== undefined;
      const tVal = parseFloat(target)||0, aVal = parseFloat(actual);
      const d = hasA && !isNaN(aVal) ? aVal - tVal : null;
      const tStr = fmt ? fmt(tVal) : tVal.toFixed(3);
      const aStr = hasA && !isNaN(aVal) ? (fmt?fmt(aVal):aVal.toFixed(3)) : '--';
      const dColor = d===null ? C.faint : Math.abs(d)<0.0005 ? C.muted : d>0 ? C.green : C.red;
      const dStr = d===null ? '--' : (d>0?'+':'') + (fmt?fmt(d):d.toFixed(3));
      return (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 6,
          padding: '7px 0', borderBottom: `1px solid ${C.border}`, alignItems: 'center' }}>
          <div style={{ fontSize: 10, color: C.textSub, fontFamily: mono, letterSpacing: '0.05em', textTransform: 'uppercase' }}>{label}</div>
          {[{val:`${tStr}${unit}`,c:C.amber},{val:`${aStr}${hasA?unit:''}`,c:hasA?C.text:C.faint},{val:`${dStr}${d!==null?unit:''}`,c:dColor}].map((x,i) => (
            <div key={i} style={{ textAlign: 'center', fontFamily: mono, fontSize: 14, fontWeight: 700, color: x.c }}>{x.val}</div>
          ))}
        </div>
      );
    };

    const DeltaTable = ({ stats, recipe, aStats }) => (
      <div>
        <div style={{ fontSize: 9, color: C.green, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 700, marginBottom: 8, fontFamily: mono, opacity: 0.9 }}>Target vs Actual</div>
        <CompHeader />
        <CompRow label="Pre-Boil OG" target={stats.preboilOG}              actual={recipe.actuals.preBoilOG}  fmt={v=>v.toFixed(3)} />
        <CompRow label="OG"          target={stats.og}                      actual={recipe.actuals.og}         fmt={v=>v.toFixed(3)} />
        <CompRow label="FG"          target={stats.fg}                      actual={recipe.actuals.fg}         fmt={v=>v.toFixed(3)} />
        <CompRow label="ABV"         target={stats.abv}                     actual={aStats.abv!=null?aStats.abv:''} fmt={v=>v.toFixed(2)} unit="%" />
        <CompRow label="Efficiency"  target={parseFloat(recipe.efficiency)||75} actual={aStats.eff!=null?aStats.eff:''} fmt={v=>v.toFixed(1)} unit="%" />
        <CompRow label="End of Boil" target={parseFloat(recipe.postboilVol)||0} actual={recipe.actuals.endBoilVol}  fmt={v=>v.toFixed(2)} unit=" gal" />
        <CompRow label="Batch Vol"   target={stats.bs}                      actual={recipe.actuals.batchVol}   fmt={v=>v.toFixed(2)} unit=" gal" />
        <CompRow label="Packaging"   target={parseFloat(recipe.packagingVol)||0} actual={recipe.actuals.packagingVol} fmt={v=>v.toFixed(2)} unit=" gal" />
      </div>
    );

    const ColorPreview = ({ srm }) => {
      const hex = srmHex(srm), rgb = srmToRgb(srm);
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ flexShrink: 0, width: 36, height: 52, borderRadius: '3px 3px 6px 6px',
            background: `linear-gradient(180deg,rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.2) 0%,${hex} 100%)`,
            border: '1.5px solid rgba(255,255,255,0.1)',
            boxShadow: `0 0 12px rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.4)`, overflow: 'hidden' }}>
            <div style={{ height: 9, background: 'rgba(255,252,240,0.88)', borderBottom: '1px solid rgba(255,252,240,0.3)' }} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', height: 16, borderRadius: 3, overflow: 'hidden', border: `1px solid ${C.border}`, marginBottom: 4 }}>
              {Array.from({length:40},(_,i) => <div key={i} style={{ flex: 1, background: srmHex(i+1) }} />)}
            </div>
            <div style={{ position: 'relative', height: 5, marginBottom: 4 }}>
              <div style={{ position: 'absolute', left: `${Math.min((srm/40)*100,99)}%`,
                transform: 'translateX(-50%)', width: 2, height: 5, background: C.text, borderRadius: 1 }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: C.muted, fontFamily: mono }}>
              <span>Straw</span>
              <span style={{ color: C.amberLt, fontWeight: 700 }}>SRM {srm.toFixed(1)}</span>
              <span>Black</span>
            </div>
          </div>
        </div>
      );
    };

    // ─── Setup modal ──────────────────────────────────────────────────────────

    const SetupModal = ({ onSave, onClose, initial={} }) => {
      const [owner, setOwner] = useState(initial.owner||'');
      const [repo,  setRepo]  = useState(initial.repo||'');
      const [pat,   setPat]   = useState('');
      const [testing, setTesting] = useState(false);
      const [msg, setMsg] = useState('');
      const [ok,  setOk]  = useState(false);
      const test = async () => {
        if (!owner||!repo||!pat) { setMsg('Fill in all fields.'); return; }
        setTesting(true); setMsg(''); setOk(false);
        try { await testConn({owner,repo,pat}); setMsg('Connected!'); setOk(true); }
        catch(e) { setMsg(`Error: ${e.message}`); }
        setTesting(false);
      };
      return (
        <Modal onClose={onClose} title="GitHub Sync Setup" width={440}>
          <div style={{ fontSize: 13, color: C.textSub, fontFamily: mono, lineHeight: 1.7, marginBottom: 16 }}>
            Recipes are saved as JSON files in your GitHub repo. Token stored in this browser only.
          </div>
          <div style={{ marginBottom: 10 }}><Label>GitHub Username</Label><TxtInp value={owner} onChange={setOwner} placeholder="e.g. krushcuts" /></div>
          <div style={{ marginBottom: 10 }}><Label>Repository Name</Label><TxtInp value={repo} onChange={setRepo} placeholder="e.g. brew-builder" /></div>
          <div style={{ marginBottom: 14 }}><Label>Personal Access Token (Contents: read+write)</Label><TxtInp value={pat} onChange={setPat} type="password" placeholder="github_pat_..." /></div>
          {msg && <div style={{ fontSize: 13, fontFamily: mono, marginBottom: 12, color: ok?C.green:C.red, padding: '9px 11px', border: `1px solid ${ok?C.green:C.red}44`, borderRadius: 4 }}>{msg}</div>}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', flexWrap: 'wrap' }}>
            {onClose && <Btn onClick={onClose} variant="ghost">Cancel</Btn>}
            <Btn onClick={test} variant="ghost" disabled={testing}>{testing?'Testing...':'Test Connection'}</Btn>
            <Btn onClick={() => onSave({owner,repo,pat})} variant="green" disabled={!ok}>Save and Connect</Btn>
          </div>
        </Modal>
      );
    };

    // ─── Recipe sections ──────────────────────────────────────────────────────

    const GrainSection = ({ recipe, stats, upGrain, removeGrain, setGP, addGrain }) => (
      <Card sx={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <SHead>Grain Bill</SHead>
          <Btn onClick={addGrain} sx={{ fontSize: 11 }}>+ Add Malt</Btn>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 96px 78px 78px 40px', gap: 6, marginBottom: 8 }}>
          {['Malt','Lbs','PPG','L',''].map((h,i) => (
            <div key={i} style={{ fontSize: 9, color: C.faint, letterSpacing: '0.1em', textTransform: 'uppercase', textAlign: i>0?'center':'left' }}>{h}</div>
          ))}
        </div>
        {recipe.grains.map(g => {
          const pct = stats.lbs>0?(parseFloat(g.lbs)||0)/stats.lbs*100:0;
          const pts = (parseFloat(g.lbs)||0)*g.ppg*((parseFloat(recipe.efficiency)||75)/100)/stats.bs;
          return (
            <div key={g.id} style={{ marginBottom: 10 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 96px 78px 78px 40px', gap: 6, alignItems: 'center' }}>
                <Sel value={g.name} onChange={e => setGP(g.id, e.target.value)}>
                  {MALTS.map(m => <option key={m.name}>{m.name}</option>)}
                </Sel>
                <Inp value={g.lbs}   step={0.25} onChange={v => upGrain(g.id,'lbs',v)}                  sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <Inp value={g.ppg}   step={1}    onChange={v => upGrain(g.id,'ppg',parseFloat(v)||0)}   sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <Inp value={g.color} step={1}    onChange={v => upGrain(g.id,'color',parseFloat(v)||0)} sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <XBtn onClick={() => removeGrain(g.id)} />
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
                <div style={{ flex: 1, height: 2, background: C.faint, borderRadius: 1 }}>
                  <div style={{ height: '100%', width: `${pct}%`, background: C.amberDim, borderRadius: 1, transition: 'width 0.2s' }} />
                </div>
                <span style={{ fontSize: 10, color: C.muted, whiteSpace: 'nowrap' }}>{pct.toFixed(0)}% / {pts.toFixed(1)}pts</span>
              </div>
            </div>
          );
        })}
        {recipe.grains.length===0 && <div style={{ textAlign: 'center', color: C.faint, padding: '16px 0', fontSize: 13 }}>No grains added</div>}
      </Card>
    );

    const HopSection = ({ recipe, stats, upHop, removeHop, setHP, addHop }) => (
      <Card sx={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <SHead>Hop Schedule</SHead>
          <Btn onClick={addHop} sx={{ fontSize: 11 }}>+ Add Hop</Btn>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 82px 82px 76px 100px 40px', gap: 6, marginBottom: 8 }}>
          {['Variety','AA%','oz','Min','Type',''].map((h,i) => (
            <div key={i} style={{ fontSize: 9, color: C.faint, letterSpacing: '0.1em', textTransform: 'uppercase', textAlign: i>0?'center':'left' }}>{h}</div>
          ))}
        </div>
        {recipe.hops.map(h => {
          const isDH = h.type==='Dry Hop';
          const mins = h.type==='Whirlpool'?15:(parseFloat(h.time)||0);
          const ibu  = isDH?0:tinseth(parseFloat(h.aa)||0,parseFloat(h.oz)||0,mins,stats.ogPts,stats.bs);
          return (
            <div key={h.id} style={{ marginBottom: 10 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 82px 82px 76px 100px 40px', gap: 6, alignItems: 'center' }}>
                <Sel value={h.name} onChange={e => setHP(h.id, e.target.value)}>
                  {HOPS.map(hp => <option key={hp.name}>{hp.name}</option>)}
                </Sel>
                <Inp value={h.aa}   step={0.5}  onChange={v => upHop(h.id,'aa',v)}   sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <Inp value={h.oz}   step={0.25} onChange={v => upHop(h.id,'oz',v)}   sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <Inp value={h.time} step={5}    disabled={isDH} onChange={v => upHop(h.id,'time',v)} sx={{ textAlign: 'right', padding: '9px 5px' }} />
                <Sel value={h.type} onChange={e => upHop(h.id,'type',e.target.value)}>
                  {['Boil','Whirlpool','Dry Hop'].map(t => <option key={t}>{t}</option>)}
                </Sel>
                <XBtn onClick={() => removeHop(h.id)} />
              </div>
              <div style={{ fontSize: 11, textAlign: 'right', color: isDH?C.faint:C.muted, marginTop: 2 }}>
                {isDH?'aroma only':`${ibu.toFixed(1)} IBU`}
              </div>
            </div>
          );
        })}
        {recipe.hops.length===0 && <div style={{ textAlign: 'center', color: C.faint, padding: '16px 0', fontSize: 13 }}>No hops added</div>}
      </Card>
    );

    // ─── Adjuncts section ─────────────────────────────────────────────────────

    const AdjunctSection = ({ recipe, upAdj, removeAdj, addAdj }) => {
      const cats = ['Fruit','Spice','Other'];
      return (
        <Card sx={{ marginBottom: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <SHead>Adjuncts</SHead>
            <Btn onClick={addAdj} sx={{ fontSize: 11 }}>+ Add Adjunct</Btn>
          </div>
          {recipe.adjuncts.length === 0 && (
            <div style={{ textAlign: 'center', color: C.faint, padding: '16px 0', fontSize: 13 }}>
              No adjuncts — fruits, spices, sugars, etc.
            </div>
          )}
          {recipe.adjuncts.map(a => (
            <div key={a.id} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: `1px solid ${C.border}` }}>
              {/* Row 1: category + name + delete */}
              <div style={{ display: 'grid', gridTemplateColumns: '100px 1fr 40px', gap: 6, marginBottom: 6 }}>
                <Sel value={a.cat} onChange={e => upAdj(a.id,'cat',e.target.value)}>
                  {cats.map(c => <option key={c}>{c}</option>)}
                </Sel>
                <Sel value={a.name} onChange={e => upAdj(a.id,'name',e.target.value)}>
                  {ADJUNCT_ITEMS.filter(x => x.cat===a.cat).map(x => <option key={x.label}>{x.label}</option>)}
                </Sel>
                <XBtn onClick={() => removeAdj(a.id)} />
              </div>
              {/* Row 2: amount + unit + timing + time */}
              <div style={{ display: 'grid', gridTemplateColumns: '80px 90px 1fr 70px', gap: 6 }}>
                <div>
                  <Label>Amount</Label>
                  <Inp value={a.amount} step={0.25} min={0} onChange={v => upAdj(a.id,'amount',v)} />
                </div>
                <div>
                  <Label>Unit</Label>
                  <Sel value={a.unit} onChange={e => upAdj(a.id,'unit',e.target.value)}>
                    {ADJUNCT_UNITS.map(u => <option key={u}>{u}</option>)}
                  </Sel>
                </div>
                <div>
                  <Label>Timing</Label>
                  <Sel value={a.timing} onChange={e => upAdj(a.id,'timing',e.target.value)}>
                    {ADJUNCT_TIMINGS.map(t => <option key={t}>{t}</option>)}
                  </Sel>
                </div>
                <div>
                  <Label>Min</Label>
                  <Inp value={a.time} step={5} min={0}
                    disabled={a.timing!=='Boil'}
                    onChange={v => upAdj(a.id,'time',v)} />
                </div>
              </div>
              {/* Optional notes */}
              <div style={{ marginTop: 6 }}>
                <input type="text" value={a.notes} placeholder="Notes (optional)"
                  onChange={e => upAdj(a.id,'notes',e.target.value)}
                  style={{ ...inputBase, fontSize: 13, color: C.textSub, padding: '7px 10px', minHeight: 34 }} />
              </div>
            </div>
          ))}
        </Card>
      );
    };

    const YeastSection = ({ recipe, up }) => (
      <Card sx={{ marginBottom: 12 }}>
        <SHead>Yeast</SHead>
        <div style={{ marginBottom: 10 }}><Label>Strain</Label>
          <Sel value={recipe.yeast.name} onChange={e => { const p=YEASTS.find(y=>y.name===e.target.value); if(p) up({yeast:p}); }}>
            {YEASTS.map(y => <option key={y.name}>{y.name}</option>)}
          </Sel>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
          <div><Label>Attenuation (%)</Label>
            <input type="number" value={recipe.yeast.atten} step={1}
              onChange={e => up({yeast:{...recipe.yeast,atten:parseInt(e.target.value)||0}})}
              style={inputBase} />
          </div>
          <div><Label>Flocculation</Label><RO sx={{ fontSize: 13 }}>{recipe.yeast.floc||'--'}</RO></div>
          <div><Label>Temp Range</Label><RO sx={{ fontSize: 13 }}>{recipe.yeast.temp||'--'}</RO></div>
        </div>
      </Card>
    );

    const ActualsInputs = ({ recipe, aStats, upA }) => (
      <Card sx={{ borderColor: `${C.green}44` }}>
        <SHead>Brew Day Actuals</SHead>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
          <div><Label>Brew Date</Label>
            <input type="date" value={recipe.actuals.brewDate} onChange={e => upA('brewDate',e.target.value)}
              style={{ ...inputBase, colorScheme: 'dark' }} />
          </div>
          <div><Label>Pre-Boil Vol (gal)</Label><Inp value={recipe.actuals.preBoilVol} step={0.25} onChange={v=>upA('preBoilVol',v)} /></div>
          <div><Label>Pre-Boil OG</Label><Inp value={recipe.actuals.preBoilOG} step={0.001} onChange={v=>upA('preBoilOG',v)} /></div>
          <div><Label>End of Boil Vol (gal)</Label><Inp value={recipe.actuals.endBoilVol} step={0.25} onChange={v=>upA('endBoilVol',v)} /></div>
          <div><Label>OG (measured)</Label><Inp value={recipe.actuals.og} step={0.001} onChange={v=>upA('og',v)} /></div>
          <div><Label>FG (measured)</Label><Inp value={recipe.actuals.fg} step={0.001} onChange={v=>upA('fg',v)} /></div>
          <div><Label>Batch Vol into Fermenter</Label><Inp value={recipe.actuals.batchVol} step={0.25} onChange={v=>upA('batchVol',v)} /></div>
          <div><Label>Packaging Vol (gal)</Label><Inp value={recipe.actuals.packagingVol} step={0.25} onChange={v=>upA('packagingVol',v)} /></div>
          {aStats.eff!==null && <div><Label>Actual Efficiency</Label><RO sx={{color:C.green,fontWeight:700}}>{aStats.eff.toFixed(1)}%</RO></div>}
          {aStats.abv!==null && <div><Label>Actual ABV</Label><RO sx={{color:C.green,fontWeight:700}}>{aStats.abv.toFixed(2)}%</RO></div>}
        </div>
        <Label>Brew Day Notes</Label>
        <textarea value={recipe.actuals.notes} onChange={e => upA('notes',e.target.value)}
          placeholder="Mash temp, water chemistry, pitch temp, fermentation notes..."
          style={{ ...inputBase, height: 80, resize: 'vertical', lineHeight: 1.55 }} />
      </Card>
    );

    // ─── Right panel (desktop sticky) ────────────────────────────────────────

    const RightPanel = ({ recipe, stats, aStats, up }) => {
      const sh = srmHex(stats.srm);
      return (
        <div>
          {/* Stats grid */}
          <Card sx={{ marginBottom: 10 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', borderRadius: 4, overflow: 'hidden' }}>
              {[
                {l:'OG',   v:stats.og.toFixed(3)},
                {l:'FG',   v:stats.fg.toFixed(3)},
                {l:'ABV',  v:`${stats.abv.toFixed(1)}%`},
                {l:'IBU',  v:stats.ibu.toFixed(0)},
                {l:'SRM',  v:stats.srm.toFixed(1), dot:sh},
                {l:'BU:GU',v:stats.bgu.toFixed(2)},
              ].map((s,i) => (
                <div key={s.l} style={{
                  borderRight: i%3<2 ? `1px solid ${C.border}` : 'none',
                  borderBottom: i<3  ? `1px solid ${C.border}` : 'none' }}>
                  <StatBlock label={s.l} value={s.v} dot={s.dot} />
                </div>
              ))}
            </div>
          </Card>

          {/* Batch + volume settings */}
          <Card sx={{ marginBottom: 10 }}>
            <SHead>Batch &amp; Volume</SHead>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div><Label>Batch Size (gal)</Label><Inp value={recipe.batchSize} step={0.25} onChange={v=>up({batchSize:v})} /></div>
              <div><Label>Mash Efficiency (%)</Label><Inp value={recipe.efficiency} step={1} onChange={v=>up({efficiency:v})} /></div>
              <div><Label>Total Grain (lbs)</Label><RO>{stats.lbs.toFixed(2)}</RO></div>
              <div><Label>Pre-Boil OG (est)</Label><RO>{stats.preboilOG.toFixed(3)}</RO></div>
              <div><Label>Pre-Boil Vol (planned)</Label>
                <Inp value={recipe.preboilVol} step={0.25} onChange={v=>up({preboilVol:v})} />
              </div>
              <div><Label>End of Boil Vol (planned)</Label>
                <Inp value={recipe.postboilVol} step={0.25} onChange={v=>up({postboilVol:v})} />
              </div>
              <div style={{ gridColumn: '1/-1' }}>
                <Label>Packaging Vol (planned)</Label>
                <Inp value={recipe.packagingVol} step={0.25} onChange={v=>up({packagingVol:v})} />
              </div>
            </div>
          </Card>

          {/* Color */}
          <Card sx={{ marginBottom: 10 }}>
            <SHead>Beer Color</SHead>
            <ColorPreview srm={stats.srm} />
          </Card>

          {/* Delta table */}
          <Card sx={{ borderColor: `${C.green}44` }}>
            <DeltaTable stats={stats} recipe={recipe} aStats={aStats} />
          </Card>
        </div>
      );
    };

    // ─── Mobile tab bar ───────────────────────────────────────────────────────

    const TABS = [
      { id:'recipe',  label:'Recipe'   },
      { id:'stats',   label:'Stats'    },
      { id:'brewday', label:'Brew Day' },
      { id:'notes',   label:'Notes'    },
    ];

    const TabBar = ({ active, onChange }) => (
      <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 100,
        background: C.surface, borderTop: `1px solid ${C.border}`, display: 'flex', height: 56 }}>
        {TABS.map(t => {
          const on = t.id===active;
          return (
            <button key={t.id} onClick={() => onChange(t.id)}
              style={{ flex: 1, background: 'transparent', border: 'none',
                color: on?C.amber:C.muted, fontSize: 11, fontFamily: mono, cursor: 'pointer',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                borderTop: on ? `2px solid ${C.amber}` : '2px solid transparent',
                letterSpacing: '0.06em', textTransform: 'uppercase' }}>
              {t.label}
            </button>
          );
        })}
      </div>
    );

    // ─── Shared modals ────────────────────────────────────────────────────────

    const VersionModal = ({ recipe, onClose, onRestore }) => (
      <Modal onClose={onClose} title="Version History" width={500}>
        {(recipe.versions||[]).length===0
          ? <div style={{ textAlign:'center', color:C.faint, padding:'20px 0', fontSize:13 }}>No saved versions yet.</div>
          : (recipe.versions||[]).slice().reverse().map(v => {
              const s = calcStats(v.snapshot.grains,v.snapshot.hops,v.snapshot.yeast,v.snapshot.batchSize,v.snapshot.efficiency);
              return (
                <div key={v.id} style={{ padding:'12px 0', borderBottom:`1px solid ${C.border}` }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <div>
                      <div style={{ fontFamily:serif, fontSize:15, color:C.text, fontWeight:700, marginBottom:3 }}>{v.label}</div>
                      <div style={{ fontSize:11, color:C.muted, fontFamily:mono }}>
                        {new Date(v.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                      </div>
                      {v.snapshot.actuals?.brewDate && <div style={{ fontSize:11, color:C.green, fontFamily:mono, marginTop:2 }}>Brewed {v.snapshot.actuals.brewDate}</div>}
                      <div style={{ display:'flex', gap:12, marginTop:5, fontSize:11, color:C.muted, fontFamily:mono }}>
                        <span>OG {s.og.toFixed(3)}</span><span>ABV {s.abv.toFixed(1)}%</span>
                        <span>IBU {s.ibu.toFixed(0)}</span><span>SRM {s.srm.toFixed(1)}</span>
                      </div>
                    </div>
                    <Btn onClick={()=>onRestore(v)} variant="ghost" sx={{fontSize:11}}>Restore</Btn>
                  </div>
                </div>
              );
            })
        }
      </Modal>
    );

    // Recipe list with inline delete confirmation
    const RecipeListModal = ({ recipe, index, onClose, onNew, onLoad, onDelete }) => {
      const [confirmId, setConfirmId] = useState(null);
      return (
        <Modal onClose={onClose} title="My Recipes" width={480}>
          <div style={{ marginBottom: 12 }}>
            <Btn onClick={onNew} variant="green" sx={{ width:'100%', display:'flex', justifyContent:'center', fontSize:13 }}>
              + New Recipe
            </Btn>
          </div>
          {index.length===0
            ? <div style={{ textAlign:'center', color:C.faint, padding:'20px 0', fontSize:13 }}>No recipes yet.</div>
            : index.map(item => (
                <div key={item.id}>
                  <div onClick={() => { if(confirmId!==item.id) onLoad(item.id); }}
                    style={{ padding:'12px', borderRadius: confirmId===item.id?'6px 6px 0 0':6, cursor:'pointer',
                      marginBottom: confirmId===item.id?0:4,
                      border: `1px solid ${recipe.id===item.id?C.amberDim:C.border}`,
                      borderBottom: confirmId===item.id?'none':undefined,
                      background: recipe.id===item.id?C.amberGlow:C.elevated,
                      display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <div>
                      <div style={{ fontFamily:serif, fontSize:15, color:C.text, fontWeight:700, marginBottom:2 }}>{item.name}</div>
                      <div style={{ fontSize:11, color:C.muted, fontFamily:mono }}>
                        {item.style} / {new Date(item.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:6, alignItems:'center' }}>
                      {recipe.id===item.id && <span style={{ fontSize:9, color:C.amber, fontFamily:mono, letterSpacing:'0.1em', textTransform:'uppercase' }}>Active</span>}
                      <button onClick={e => { e.stopPropagation(); setConfirmId(item.id); }}
                        style={{ background:'transparent', border:'none', color:C.faint, cursor:'pointer', fontSize:16, lineHeight:1, padding:'4px 6px' }}
                        onMouseEnter={e => e.currentTarget.style.color=C.red}
                        onMouseLeave={e => e.currentTarget.style.color=C.faint}>x</button>
                    </div>
                  </div>
                  {confirmId===item.id && (
                    <div style={{ padding:'10px 12px', background:'rgba(192,64,48,0.1)',
                      border:`1px solid ${C.red}55`, borderTop:'none',
                      borderRadius:'0 0 6px 6px', marginBottom:4,
                      display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
                      <span style={{ fontSize:12, color:C.textSub, fontFamily:mono }}>
                        Delete "{item.name}"? This cannot be undone.
                      </span>
                      <div style={{ display:'flex', gap:6, flexShrink:0 }}>
                        <Btn onClick={e => { e.stopPropagation(); setConfirmId(null); }} variant="ghost" sx={{fontSize:11}}>Cancel</Btn>
                        <Btn onClick={e => { e.stopPropagation(); onDelete(item.id,e); setConfirmId(null); }} variant="danger" sx={{fontSize:11}}>Delete</Btn>
                      </div>
                    </div>
                  )}
                </div>
              ))
          }
        </Modal>
      );
    };

    // ─── Main App ─────────────────────────────────────────────────────────────

    function BrewBuilder() {
      const width  = useWidth();
      const mobile = width < 640;

      useEffect(() => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Courier+Prime:wght@400;700&display=swap';
        document.head.appendChild(link);
        return () => { try { document.head.removeChild(link); } catch(e) {} };
      }, []);

      // GitHub
      const [cfg,       setCfg]      = useState(null);
      const cfgRef = useRef(null); // always-current cfg for async callbacks
      useEffect(() => { cfgRef.current = cfg; }, [cfg]);

      const [syncSt,    setSyncSt]   = useState('idle');
      const [syncErr,   setSyncErr]  = useState('');
      const [showSetup, setShowSetup]= useState(false);
      const sha = useRef({});
      const enqueue = useRef(null);

      useEffect(() => {
        enqueue.current = makeWriteQueue(sha, setSyncSt, setSyncErr);
      }, []);

      // Recipe state
      const [recipe,  setRecipe]  = useState(blank('Cascade Pale Ale'));
      const [index,   setIndex]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [dirty,   setDirty]   = useState(false);

      // UI
      const [tab,      setTab]     = useState('recipe');
      const [showList, setShowList]= useState(false);
      const [showSave, setShowSave]= useState(false);
      const [showVer,  setShowVer] = useState(false);
      const [vLabel,   setVLabel]  = useState('');
      const [saveMsg,  setSaveMsg] = useState('');

      // Load config
      useEffect(() => {
        loadCfg().then(c => {
          if (c) setCfg(c);
          else { setShowSetup(true); setLoading(false); }
        });
      }, []);

      // Load recipes once config ready
      useEffect(() => {
        if (!cfg) return;
        setLoading(true);
        ghGetRaw(cfg, 'recipes/index.json').then(res => {
          if (res) {
            sha.current['recipes/index.json'] = res.sha;
            setIndex(res.content);
            if (res.content.length > 0) {
              const id = res.content[0].id;
              ghGetRaw(cfg, `recipes/${id}.json`).then(rr => {
                if (rr) { sha.current[`recipes/${id}.json`] = rr.sha; setRecipe(rr.content); }
                setLoading(false);
              }).catch(() => setLoading(false));
            } else setLoading(false);
          } else setLoading(false);
        }).catch(e => { setSyncErr(e.message); setSyncSt('error'); setLoading(false); });
      }, [cfg]);

      const write = useCallback((r, idx) => {
        const c = cfgRef.current;
        if (!c || !enqueue.current) return;
        setIndex(idx);
        enqueue.current(c, r, idx).catch(() => {});
      }, []);

      // Auto-save debounce — 2 seconds
      const latestR = useRef(recipe);
      const latestI = useRef(index);
      useEffect(() => { latestR.current = recipe; }, [recipe]);
      useEffect(() => { latestI.current = index;  }, [index]);

      useEffect(() => {
        if (!dirty || !cfg) return;
        const t = setTimeout(() => {
          const r = latestR.current, cur = latestI.current;
          const ni = cur.some(x=>x.id===r.id)
            ? cur.map(x=>x.id===r.id?{id:r.id,name:r.name,style:r.style,updatedAt:r.updatedAt}:x)
            : [{id:r.id,name:r.name,style:r.style,updatedAt:r.updatedAt},...cur];
          write(r, ni);
          setDirty(false);
        }, 2000);
        return () => clearTimeout(t);
      }, [dirty, cfg, write]);

      const up = useCallback(patch => {
        setRecipe(r => ({...r,...patch,updatedAt:Date.now()}));
        setDirty(true);
      }, []);

      // Stats
      const stats = useMemo(() =>
        calcStats(recipe.grains, recipe.hops, recipe.yeast, recipe.batchSize, recipe.efficiency),
        [recipe.grains, recipe.hops, recipe.yeast, recipe.batchSize, recipe.efficiency]);

      const aStats = useMemo(() => {
        const a = recipe.actuals;
        const aOG = parseFloat(a.og)||null, aFG = parseFloat(a.fg)||null, aVol = parseFloat(a.batchVol)||null;
        return {
          abv: aOG&&aFG ? (aOG-aFG)*131.25 : null,
          eff: aOG&&aVol&&stats.totalGrainPts>0 ? (aOG-1)*1000*aVol/stats.totalGrainPts*100 : null,
        };
      }, [recipe.actuals, stats.totalGrainPts]);

      // Grain ops
      const addGrain    = () => up({grains:[...recipe.grains,{id:uid(),name:'2-Row Pale',ppg:37,color:1.8,lbs:'1'}]});
      const removeGrain = id => up({grains:recipe.grains.filter(x=>x.id!==id)});
      const upGrain     = (id,f,v) => up({grains:recipe.grains.map(x=>x.id===id?{...x,[f]:v}:x)});
      const setGP       = (id,name) => { const p=MALTS.find(m=>m.name===name); if(p) up({grains:recipe.grains.map(x=>x.id===id?{...x,...p}:x)}); };

      // Hop ops
      const addHop    = () => up({hops:[...recipe.hops,{id:uid(),name:'Cascade',aa:'5.5',oz:'1.0',time:'60',type:'Boil'}]});
      const removeHop = id => up({hops:recipe.hops.filter(x=>x.id!==id)});
      const upHop     = (id,f,v) => up({hops:recipe.hops.map(x=>x.id===id?{...x,[f]:v}:x)});
      const setHP     = (id,name) => { const p=HOPS.find(h=>h.name===name); if(p) up({hops:recipe.hops.map(x=>x.id===id?{...x,name:p.name,aa:String(p.aa)}:x)}); };

      // Adjunct ops
      const addAdj    = () => {
        const first = ADJUNCT_ITEMS[0];
        up({adjuncts:[...recipe.adjuncts,{id:uid(),cat:'Fruit',name:first.label,amount:'1',unit:'oz',timing:'Secondary',time:'0',notes:''}]});
      };
      const removeAdj = id => up({adjuncts:recipe.adjuncts.filter(x=>x.id!==id)});
      const upAdj     = (id,f,v) => {
        // If category changes, reset name to first item in that cat
        if (f==='cat') {
          const first = ADJUNCT_ITEMS.find(x=>x.cat===v);
          up({adjuncts:recipe.adjuncts.map(x=>x.id===id?{...x,cat:v,name:first?first.label:x.name}:x)});
        } else {
          up({adjuncts:recipe.adjuncts.map(x=>x.id===id?{...x,[f]:v}:x)});
        }
      };

      const upA = (f,v) => up({actuals:{...recipe.actuals,[f]:v}});

      // Save version
      const saveVersion = () => {
        const n = (recipe.versions||[]).length+1;
        const lbl = vLabel.trim()||`Version ${n}`;
        const ver = { id:gid(), num:n, label:lbl, savedAt:Date.now(),
          snapshot:{ name:recipe.name, style:recipe.style, batchSize:recipe.batchSize,
            efficiency:recipe.efficiency, preboilVol:recipe.preboilVol, postboilVol:recipe.postboilVol,
            packagingVol:recipe.packagingVol, notes:recipe.notes,
            grains:JSON.parse(JSON.stringify(recipe.grains)),
            hops:JSON.parse(JSON.stringify(recipe.hops)),
            adjuncts:JSON.parse(JSON.stringify(recipe.adjuncts||[])),
            yeast:{...recipe.yeast}, actuals:{...recipe.actuals} } };
        const upd = {...recipe, versions:[...(recipe.versions||[]),ver], updatedAt:Date.now()};
        setRecipe(upd); setVLabel(''); setShowSave(false);
        setSaveMsg(`Saved "${lbl}"`); setTimeout(()=>setSaveMsg(''),3000);
        const ni = index.some(x=>x.id===upd.id)
          ? index.map(x=>x.id===upd.id?{id:upd.id,name:upd.name,style:upd.style,updatedAt:upd.updatedAt}:x)
          : [{id:upd.id,name:upd.name,style:upd.style,updatedAt:upd.updatedAt},...index];
        write(upd, ni); setDirty(false);
      };

      const loadVer = v => {
        setRecipe(r => ({...r,...v.snapshot,versions:r.versions,id:r.id,createdAt:r.createdAt}));
        setShowVer(false); setDirty(true);
      };

      const newRecipe = () => {
        const r = blank(); setRecipe(r); setDirty(false); setShowList(false);
        const ni = [{id:r.id,name:r.name,style:r.style,updatedAt:r.updatedAt},...index];
        write(r, ni);
      };

      // Fix: use cfgRef.current so we always have the latest cfg in async callbacks
      const loadRecipe = useCallback(id => {
        const c = cfgRef.current;
        if (!c) return;
        setShowList(false); setSyncSt('syncing');
        const path = `recipes/${id}.json`;
        ghGetRaw(c, path).then(res => {
          if (res) {
            sha.current[path] = res.sha;
            // Ensure adjuncts array exists (backward compat with old saved recipes)
            const loaded = res.content;
            if (!loaded.adjuncts) loaded.adjuncts = [];
            if (!loaded.preboilVol) loaded.preboilVol = '';
            if (!loaded.postboilVol) loaded.postboilVol = '';
            if (!loaded.packagingVol) loaded.packagingVol = '';
            if (!loaded.actuals.endBoilVol) loaded.actuals.endBoilVol = '';
            if (!loaded.actuals.packagingVol) loaded.actuals.packagingVol = '';
            setRecipe(loaded);
            setDirty(false);
          }
          setSyncSt('synced'); setTimeout(()=>setSyncSt('idle'),2000);
        }).catch(e => { setSyncSt('error'); setSyncErr(e.message); });
      }, []);

      const delRecipe = (id, e) => {
        e.stopPropagation();
        const ni = index.filter(x=>x.id!==id);
        setIndex(ni);
        const c = cfgRef.current;
        if (c) {
          ghDel(c, `recipes/${id}.json`, `Delete recipe ${id}`)
            .then(() => ghPutFile(c, 'recipes/index.json', ni, sha.current['recipes/index.json'], 'Update index'))
            .then(s => { sha.current['recipes/index.json']=s; })
            .catch(e => { setSyncSt('error'); setSyncErr(e.message); });
        }
        if (recipe.id===id) {
          if (ni.length>0) loadRecipe(ni[0].id); else setRecipe(blank());
        }
      };

      const saveCfgAndConnect = async nc => { await saveCfg(nc); setCfg(nc); setShowSetup(false); };

      if (loading && cfg) return (
        <div style={{ background:C.bg, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:mono, color:C.muted, fontSize:14 }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ fontSize:24, color:C.amber, marginBottom:12 }}>...</div>
            Loading from GitHub...
          </div>
        </div>
      );

      const Header = (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, flexWrap:'wrap', gap:6 }}>
            <div style={{ fontSize:10, color:C.amberDim, letterSpacing:'0.2em', textTransform:'uppercase' }}>HOMEBREW RECIPE BUILDER</div>
            <div style={{ display:'flex', gap:6, alignItems:'center' }}>
              <SyncBadge status={syncSt} onRetry={()=>{setSyncSt('idle');setDirty(true);}} />
              <Btn onClick={()=>setShowSetup(true)} variant="ghost" sx={{fontSize:10,padding:'4px 8px',minHeight:28}}>GitHub</Btn>
            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'flex-end', marginBottom:8, flexWrap:'wrap' }}>
            <input value={recipe.name} onChange={e=>up({name:e.target.value})}
              style={{ background:'transparent', border:'none', borderBottom:`1px solid ${C.borderLt}`,
                borderRadius:0, color:C.text, padding:'4px 0 7px', fontSize:mobile?22:28,
                flex:1, minWidth:0, fontFamily:serif, fontWeight:700, outline:'none' }} />
            <div style={{ display:'flex', gap:6, flexShrink:0 }}>
              <Btn onClick={()=>setShowList(true)} variant="ghost" sx={{fontSize:11}}>
                Recipes{index.length>0?` (${index.length})`:''}
              </Btn>
              <Btn onClick={()=>setShowSave(true)} variant="green" sx={{fontSize:11}}>Save Version</Btn>
            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
            <div style={{ flex:'1 1 200px' }}>
              <Sel value={recipe.style} onChange={e=>up({style:e.target.value})}>
                {STYLES.map(s => <option key={s}>{s}</option>)}
              </Sel>
            </div>
            {(recipe.versions||[]).length>0 && (
              <Btn onClick={()=>setShowVer(true)} variant="ghost" sx={{fontSize:11,flexShrink:0}}>
                {recipe.versions.length} version{recipe.versions.length!==1?'s':''}
              </Btn>
            )}
            {saveMsg && <span style={{fontSize:12,color:C.green,fontFamily:mono,padding:'4px 10px',border:`1px solid ${C.green}`,borderRadius:4}}>{saveMsg}</span>}
          </div>
        </div>
      );

      const Modals = (
        <span>
          {showSetup && <SetupModal onSave={saveCfgAndConnect} onClose={cfg?()=>setShowSetup(false):null} initial={cfg||{}} />}
          {showSave && (
            <Modal onClose={()=>setShowSave(false)} title="Save Version" width={400}>
              <div style={{marginBottom:10}}><Label>Version Label (optional)</Label><TxtInp value={vLabel} onChange={setVLabel} placeholder='e.g. "Brew Day 1"' /></div>
              <div style={{fontSize:13,color:C.textSub,fontFamily:mono,marginBottom:14,lineHeight:1.6}}>Saves a full snapshot — recipe, adjuncts, and actuals — to GitHub.</div>
              <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                <Btn onClick={()=>setShowSave(false)} variant="ghost">Cancel</Btn>
                <Btn onClick={saveVersion} variant="green">Save Snapshot</Btn>
              </div>
            </Modal>
          )}
          {showVer  && <VersionModal recipe={recipe} onClose={()=>setShowVer(false)} onRestore={loadVer} />}
          {showList && <RecipeListModal recipe={recipe} index={index} onClose={()=>setShowList(false)} onNew={newRecipe} onLoad={loadRecipe} onDelete={delRecipe} />}
        </span>
      );

      // ── Desktop ─────────────────────────────────────────────────────────────
      if (!mobile) {
        return (
          <div style={{ fontFamily:mono, background:C.bg, minHeight:'100vh', color:C.text }}>
            <div style={{ maxWidth:1020, margin:'0 auto', padding:'20px 20px 40px' }}>
              {Header}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 390px', gap:18, alignItems:'start' }}>
                <div>
                  <GrainSection recipe={recipe} stats={stats} upGrain={upGrain} removeGrain={removeGrain} setGP={setGP} addGrain={addGrain} />
                  <HopSection   recipe={recipe} stats={stats} upHop={upHop}     removeHop={removeHop}     setHP={setHP}   addHop={addHop}   />
                  <AdjunctSection recipe={recipe} upAdj={upAdj} removeAdj={removeAdj} addAdj={addAdj} />
                  <YeastSection recipe={recipe} up={up} />
                  <div style={{marginTop:12}}><ActualsInputs recipe={recipe} aStats={aStats} upA={upA} /></div>
                  <Card sx={{marginTop:12}}>
                    <SHead>Recipe Notes</SHead>
                    <textarea value={recipe.notes} onChange={e=>up({notes:e.target.value})}
                      placeholder="Grain mill gap, mash schedule, hop stand details..."
                      style={{...inputBase,height:90,resize:'vertical',lineHeight:1.55}} />
                  </Card>
                </div>
                <div style={{ position:'sticky', top:20, maxHeight:'calc(100vh - 40px)', overflowY:'auto', paddingRight:2 }}>
                  <RightPanel recipe={recipe} stats={stats} aStats={aStats} up={up} />
                  <div style={{marginTop:10,textAlign:'center',fontSize:9,color:C.faint,letterSpacing:'0.12em',fontFamily:mono}}>
                    IBU: TINSETH / SRM: MOREY
                  </div>
                </div>
              </div>
            </div>
            {Modals}
          </div>
        );
      }

      // ── Mobile (tabbed) ──────────────────────────────────────────────────────
      return (
        <div style={{ fontFamily:mono, background:C.bg, minHeight:'100vh', color:C.text, padding:'12px 12px 68px', boxSizing:'border-box' }}>
          {Header}
          {tab==='recipe' && (
            <div>
              <GrainSection recipe={recipe} stats={stats} upGrain={upGrain} removeGrain={removeGrain} setGP={setGP} addGrain={addGrain} />
              <HopSection   recipe={recipe} stats={stats} upHop={upHop}     removeHop={removeHop}     setHP={setHP}   addHop={addHop}   />
              <AdjunctSection recipe={recipe} upAdj={upAdj} removeAdj={removeAdj} addAdj={addAdj} />
              <YeastSection recipe={recipe} up={up} />
            </div>
          )}
          {tab==='stats' && (
            <div>
              <Card sx={{marginBottom:12}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderRadius:4,overflow:'hidden'}}>
                  {[
                    {l:'OG',   v:stats.og.toFixed(3)},
                    {l:'FG',   v:stats.fg.toFixed(3)},
                    {l:'ABV',  v:`${stats.abv.toFixed(1)}%`},
                    {l:'IBU',  v:stats.ibu.toFixed(0)},
                    {l:'SRM',  v:stats.srm.toFixed(1),dot:srmHex(stats.srm)},
                    {l:'BU:GU',v:stats.bgu.toFixed(2)},
                  ].map((s,i) => (
                    <div key={s.l} style={{borderRight:i%3<2?`1px solid ${C.border}`:'none',borderBottom:i<3?`1px solid ${C.border}`:'none'}}>
                      <StatBlock label={s.l} value={s.v} dot={s.dot} />
                    </div>
                  ))}
                </div>
              </Card>
              <Card sx={{marginBottom:12}}>
                <SHead>Batch &amp; Volume</SHead>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div><Label>Batch Size (gal)</Label><Inp value={recipe.batchSize} step={0.25} onChange={v=>up({batchSize:v})} /></div>
                  <div><Label>Mash Efficiency (%)</Label><Inp value={recipe.efficiency} step={1} onChange={v=>up({efficiency:v})} /></div>
                  <div><Label>Total Grain (lbs)</Label><RO>{stats.lbs.toFixed(2)}</RO></div>
                  <div><Label>Pre-Boil OG (est)</Label><RO>{stats.preboilOG.toFixed(3)}</RO></div>
                  <div><Label>Pre-Boil Vol (planned)</Label><Inp value={recipe.preboilVol} step={0.25} onChange={v=>up({preboilVol:v})} /></div>
                  <div><Label>End of Boil Vol (planned)</Label><Inp value={recipe.postboilVol} step={0.25} onChange={v=>up({postboilVol:v})} /></div>
                  <div style={{gridColumn:'1/-1'}}><Label>Packaging Vol (planned)</Label><Inp value={recipe.packagingVol} step={0.25} onChange={v=>up({packagingVol:v})} /></div>
                </div>
              </Card>
              <Card>
                <SHead>Beer Color</SHead>
                <ColorPreview srm={stats.srm} />
              </Card>
            </div>
          )}
          {tab==='brewday' && (
            <div>
              <ActualsInputs recipe={recipe} aStats={aStats} upA={upA} />
              <Card sx={{marginTop:12,borderColor:`${C.green}44`}}>
                <DeltaTable stats={stats} recipe={recipe} aStats={aStats} />
              </Card>
            </div>
          )}
          {tab==='notes' && (
            <div>
              <Card sx={{marginBottom:12}}>
                <SHead>Recipe Notes</SHead>
                <textarea value={recipe.notes} onChange={e=>up({notes:e.target.value})}
                  placeholder="Grain mill gap, mash schedule, hop stand details, adjuncts..."
                  style={{...inputBase,height:140,resize:'vertical',lineHeight:1.55}} />
              </Card>
              <Card>
                <SHead>Brew Day Notes</SHead>
                <textarea value={recipe.actuals.notes} onChange={e=>upA('notes',e.target.value)}
                  placeholder="Mash temp, water chemistry, pitch temp, fermentation observations..."
                  style={{...inputBase,height:140,resize:'vertical',lineHeight:1.55}} />
              </Card>
            </div>
          )}
          <TabBar active={tab} onChange={setTab} />
          {Modals}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BrewBuilder />);
  </script>
</body>
</html>
